<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
                <div class="qus-list vh-100 bg-secondary-subtle overflow-y-auto">
                    <h2 class="text-center mt-2">Qus List</h2>
                    <ul class="list-unstyled"></ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="display-quiz vh-100 bg-danger-subtle">
                    <div class="card">
                        <h2 class="bg-white m-3">My Quiz App.</h2>
                        <div class="card-header">
                            <h4></h4>
                        </div>
                        <div class="card-body">
                           <ul class="list-unstyled"></ul>
                        </div>
                        <div class="card-footer text-body-secondary d-flex justify-content-between">
                            <button class="btn btn-outline-success" type="button" id="prev">Prev</button>
                            <button class="btn btn-outline-success" type="button" id="next">Next</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="vh-100 bg-info-subtle">
                    <h2 class="text-center pt-3">Qus Count</h2>
                    <div class="text-center">
                        <button id="quiz-submit" class="btn btn-outline-success">Submit</button>
                    </div>
                    <div class="display-quiz-button d-flex flex-wrap p-3">

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="./js/script.js" type="module"></script>
</body>

</html>
