    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <form method="post" id="product-form">
                    <h2>Add Product Details</h2>
                    <div class="mb-3">
                        <label for="title" class="form-label text-capitalize">title</label>
                        <input type="text" class="form-control" name="title" id="title">
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label text-capitalize">image</label>
                        <input type="url" class="form-control" name="image" id="image">
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label text-capitalize">price</label>
                        <input type="number" min="500" max="50000" class="form-control" name="price" id="price">
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label text-capitalize">category</label>
                        <select name="category" id="category" class="form-control">
                            <option value="" selected disabled>--select-category--</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Home & Garden">Home & Garden</option>
                            <option value="Health & Beauty">Health & Beauty</option>
                            <option value="Books & Stationary">Books & Stationary</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="stock" class="form-label text-capitalize">stock</label>
                        <input type="number" min="10" max="50" class="form-control" name="stock" id="stock">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label text-capitalize">Description</label>
                        <textarea class="form-control" rows="3" name="description" id="description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
